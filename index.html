<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Input Nota</title>

<style>
body{
  font-family:Arial;
  max-width:400px;
  margin:auto;
  padding:20px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
}

button{
  background:#198754;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h3>Input Nota</h3>

<select id="jenis">
  <option value="Belanja">Belanja</option>
  <option value="TF">TF</option>
  <option value="Cash">Cash</option>
</select>

<input type="number" id="nominal" placeholder="Nominal">

<button onclick="kirim()">Simpan</button>

<script>

const URL = "https://script.google.com/macros/s/AKfycbz2vds4yOHdgds4HNMwanywWsnnMCQ7lVjugfk2VweNcZHj57dC9EEx9cyI8NZaeI7ncw/exec";

function kirim(){

  const form = document.createElement("form");
  form.method = "POST";
  form.action = URL;

  const j = document.createElement("input");
  j.name = "jenis";
  j.value = document.getElementById("jenis").value;

  const n = document.createElement("input");
  n.name = "nominal";
  n.value = document.getElementById("nominal").value;

  form.appendChild(j);
  form.appendChild(n);

  document.body.appendChild(form);
  form.submit();
}

</script>

</body>
</html>
