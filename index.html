<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Nota Berjalan</title>

<style>
body{
  font-family:Arial;
  max-width:500px;
  margin:auto;
  padding:15px;
  background:#f5f5f5;
}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 1px 5px rgba(0,0,0,.1);
}

.nominal{
  font-size:22px;
  font-weight:bold;
}

select,input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  background:#198754;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div class="card">
  <div>Total Belanja</div>
  <div class="nominal" id="belanja">Rp 0</div>
</div>

<div class="card">
  <div>Total Setor</div>
  <div class="nominal" id="setor">Rp 0</div>
</div>

<div class="card">
  <div>Sisa Nota</div>
  <div class="nominal" id="sisa">Rp 0</div>
</div>

<div class="card">

<select id="jenis">
  <option value="Belanja">Belanja</option>
  <option value="Setor">Setor</option>
</select>

<input type="number" id="nominal" placeholder="Nominal">

<button onclick="simpan()">Simpan</button>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbz2vds4yOHdgds4HNMwanywWsnnMCQ7lVjugfk2VweNcZHj57dC9EEx9cyI8NZaeI7ncw/exec";

function simpan(){

  const formData = new FormData();
  formData.append("jenis", document.getElementById("jenis").value);
  formData.append("nominal", document.getElementById("nominal").value);
  formData.append("action", "nota");

  fetch(URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(res => {
    alert("Tersimpan");
    load();
  })
  .catch(err => {
    alert("Error koneksi");
    console.log(err);
  });
}

function load(){

  const formData = new FormData();
  formData.append("action", "getNota");

  fetch(URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    document.getElementById("belanja").innerText =
      "Rp " + data.totalBelanja.toLocaleString("id-ID");

    document.getElementById("setor").innerText =
      "Rp " + data.totalSetor.toLocaleString("id-ID");

    document.getElementById("sisa").innerText =
      "Rp " + data.sisaNota.toLocaleString("id-ID");
  });
}

load();
</script>

</body>
</html>
